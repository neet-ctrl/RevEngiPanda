name: Build Signed Calc APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install apktool
        run: |
          wget -q https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool -O /usr/local/bin/apktool
          wget -q https://bitbucket.org/iBotPeaches/apktool/downloads/apktool_2.11.1.jar -O /usr/local/bin/apktool.jar
          chmod +x /usr/local/bin/apktool
          apktool --version

      - name: Install apksigner
        run: |
          sudo apt-get install -y apksigner

      - name: Decompile base APK
        run: |
          apktool d apks/base.apk -o decompiled_app --force

      - name: Patch smali - Add Calc Premium Overlay
        run: |
          SMALI="decompiled_app/smali/com/digitaltool/mobiletoolbox/smarttoolbox/MainActivity.smali"
          
          # Check the overlay is not already patched
          if grep -q "Calc Premium Overlay" "$SMALI"; then
            echo "Already patched, skipping."
          else
            # Inject before return-void in onCreate
            python3 - <<'PYEOF'
          import re

          smali_path = "decompiled_app/smali/com/digitaltool/mobiletoolbox/smarttoolbox/MainActivity.smali"

          overlay_code = '''
              # --- BEGIN: Calc Premium Overlay ---
              invoke-virtual {p0}, Landroid/app/Activity;->getWindow()Landroid/view/Window;
              move-result-object v0
              invoke-virtual {v0}, Landroid/view/Window;->getDecorView()Landroid/view/View;
              move-result-object v0
              check-cast v0, Landroid/view/ViewGroup;
              new-instance v1, Landroid/widget/TextView;
              invoke-direct {v1, p0}, Landroid/widget/TextView;-><init>(Landroid/content/Context;)V
              const-string v2, " Calc "
              invoke-virtual {v1, v2}, Landroid/widget/TextView;->setText(Ljava/lang/CharSequence;)V
              const/4 v2, -0x1
              invoke-virtual {v1, v2}, Landroid/widget/TextView;->setTextColor(I)V
              const/4 v2, 0x2
              const v3, 0x41800000
              invoke-virtual {v1, v2, v3}, Landroid/widget/TextView;->setTextSize(IF)V
              sget-object v2, Landroid/graphics/Typeface;->DEFAULT_BOLD:Landroid/graphics/Typeface;
              invoke-virtual {v1, v2}, Landroid/widget/TextView;->setTypeface(Landroid/graphics/Typeface;)V
              const v2, -0x2900
              invoke-virtual {v1, v2}, Landroid/widget/TextView;->setBackgroundColor(I)V
              const/16 v2, 0x14
              const/16 v3, 0x8
              invoke-virtual {v1, v2, v3, v2, v3}, Landroid/widget/TextView;->setPadding(IIII)V
              new-instance v2, Landroid/widget/FrameLayout$LayoutParams;
              const/4 v3, -0x2
              const v4, 0x800035
              invoke-direct {v2, v3, v3, v4}, Landroid/widget/FrameLayout$LayoutParams;-><init>(III)V
              invoke-virtual {v0, v1, v2}, Landroid/view/ViewGroup;->addView(Landroid/view/View;Landroid/view/ViewGroup$LayoutParams;)V
              # --- END: Calc Premium Overlay ---
          '''

          with open(smali_path, 'r') as f:
              content = f.read()

          # Find onCreate method's return-void
          pattern = r'(    invoke-static \{p0, v0\}, Lc/d;->a\(Lb/p;Ln3/d;\)V\n)((?:\n.*\.line.*\n)*\n    return-void\n\.end method)'
          replacement = r'\1' + overlay_code + r'\2'
          new_content = re.sub(pattern, replacement, content, count=1)

          if new_content == content:
              # Fallback: simple injection before last return-void in onCreate
              # Find onCreate and its return-void
              oncreate_start = content.find('.method public final onCreate(Landroid/os/Bundle;)V')
              if oncreate_start != -1:
                  oncreate_end = content.find('.end method', oncreate_start)
                  oncreate_block = content[oncreate_start:oncreate_end]
                  last_return = oncreate_block.rfind('    return-void')
                  if last_return != -1:
                      insert_pos = oncreate_start + last_return
                      new_content = content[:insert_pos] + overlay_code + '\n' + content[insert_pos:]
                      print("Patched via fallback method")
                  else:
                      print("ERROR: Could not find return-void in onCreate")
                      exit(1)
              else:
                  print("ERROR: Could not find onCreate method")
                  exit(1)
          else:
              print("Patched via primary method")

          with open(smali_path, 'w') as f:
              f.write(new_content)

          print("Smali patch applied successfully.")
          PYEOF
          fi

      - name: Rebuild APK
        run: |
          mkdir -p output
          apktool b decompiled_app -o output/calc_unsigned.apk --use-aapt2

      - name: Decode keystore
        run: |
          mkdir -p signing
          echo "" | base64 -d > signing/my-release-key.jks
          keytool -list -keystore signing/my-release-key.jks -storepass 'Sh@090609' -alias my-key
          echo "Keystore decoded and verified."

      - name: Sign APK
        run: |
          apksigner sign \
            --ks signing/my-release-key.jks \
            --ks-pass pass:'Sh@090609' \
            --ks-key-alias my-key \
            --key-pass pass:'Sh@090609' \
            --out output/calc_signed.apk \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            output/calc_unsigned.apk

      - name: Verify signed APK
        run: |
          apksigner verify --verbose output/calc_signed.apk

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: calc-signed-apk
          path: output/calc_signed.apk
          retention-days: 30
